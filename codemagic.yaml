# codemagic.yaml
workflows:
  ios-workflow:
    name: iOS Sideload Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build iOS
        script: |
          # Build the compiled app bundle
          flutter build ios --release --no-codesign
      - name: Package for Sideloadly
        script: |
          # This creates the IPA structure manually
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r WeatherApp_Sideload.ipa Payload
    artifacts:
      - "*.ipa"
      - build/ios/iphoneos/*.a